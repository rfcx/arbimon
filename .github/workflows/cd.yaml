name: 'CD'
on:
  workflow_dispatch:
    inputs:
      deploy_cli:
        description: Deploy CLI
        type: boolean
        default: true
      deploy_api:
        description: Deploy API
        type: boolean
        default: true
      deploy_web:
        description: Deploy Website
        type: boolean
        default: true
  push:
    branches:
      - master
      # NOTE: 'staging' was removed from this list 2026-05-19. The current
      # `Deploy: rfcx-local` job is gated to namespace=='production' (master
      # only), so push to staging triggered the workflow but skipped every
      # deploy step. Until a real staging environment is provisioned in
      # rfcx-local (apps-staging namespace + staging.arbimon.org ingress),
      # CD on staging is a no-op and only confused contributors. See
      # rfcx-local STATE.md / runbooks for the planned staging environment.
concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:  
  configure:
    name: 'Configure'
    runs-on: ubuntu-latest
    outputs:
      namespace: ${{ steps.configuration.outputs.namespace }}
      release-date: ${{ steps.configuration.outputs.release-date }}
      short-sha: ${{ steps.configuration.outputs.short-sha }}
    steps:
      - name: 'Output branch name'
        id: branch
        run: |
          if [[ "${{ github.event_name }}" = "pull_request" ]]; then echo "branch-name=`echo ${GITHUB_HEAD_REF}`" >> $GITHUB_OUTPUT; else echo "branch-name=`echo ${GITHUB_REF#refs/heads/}`" >> $GITHUB_OUTPUT; fi
      - name: 'Conditional environment'
        id: configuration
        run: |
          if [[ "${{ steps.branch.outputs.branch-name }}" == "master" ]]; then
            echo "namespace=production" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.branch.outputs.branch-name }}" == "staging" ]]; then
            echo "namespace=staging" >> "$GITHUB_OUTPUT"
          else
            echo "namespace=testing" >> "$GITHUB_OUTPUT"
          fi

          echo "release-date=$( date +"%s" ) >> $GITHUB_OUTPUT"
          echo "short-sha=$(echo ${GITHUB_SHA} | cut -c1-8) >> $GITHUB_OUTPUT"

  deploy-rfcx-local:
    name: 'Deploy: rfcx-local'
    needs: [configure]
    if: ${{ needs.configure.outputs.namespace == 'production' }}
    uses: rfcx/cicd/.github/workflows/rfcx-local-cd.yaml@master
    with:
      repo: arbimon
      dockerfile: tools/deployment/Dockerfile
      targets: '["biodiversity-api","biodiversity-cli","biodiversity-website"]'
      deployments: |
        [
          {"name": "biodiversity-api",     "image": "biodiversity-api"},
          {"name": "biodiversity-website", "image": "biodiversity-website"}
        ]


  notify:
    name: 'Notify'
    if: ${{ always() }}
    needs: [deploy-rfcx-local]
    uses: rfcx/cicd/.github/workflows/notify.yaml@master
    with:
      workflow-id: cd.yaml
      status: ${{ needs.deploy-rfcx-local.result }}
      always: true
      notification-title: 'CD: Arbimon'
      notification-footer: "Deploy (rfcx-local): ${{ needs.deploy-rfcx-local.result || 'n/a' }}"
    secrets:
      slack-webhook: ${{ secrets.SLACK_ALERT_ARBIMON_WEBHOOK }}
      github-token: ${{ secrets.GITHUB_TOKEN }}
